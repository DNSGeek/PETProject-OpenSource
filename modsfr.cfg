# modsfr.cfg — linker config for the Search/Replace module
# HEADER: 2-byte PRG load address at $BFFE-$BFFF
# MAIN:   module code $C000-$C7FF (2 KB — code is ~1.7 KB)
# BSS:    module local variables $C800+ (not written to PRG file)

MEMORY {
    HEADER: start = $BFFE, size =   $2, fill = yes, fillval = $00, file = %O;
    MAIN:   start = $C000, size = $800, fill = yes, fillval = $EA, file = %O;
    BSS:    start = $C800, size = $100, fill = no,                 file = "";
}

SEGMENTS {
    LOADADDR: load = HEADER, type = ro;
    CODE:     load = MAIN,   type = ro;
    BSS:      load = BSS,    type = bss;
}
